<!DOCTYPE html>

    <header class="navbar">

            토퍼는 선후배 사이도 좋아 서로 피드백을 주며<br>

            don't worry.

            <img src="imgzip/창의력.png" alt="">

        <h6>

            초점을 맞추었습니다. 그러니 don't worry.
        </h6>
        
    </section>

    <section id="page3" class="page">
        <h1>전공 질문 어렵나요?</h1>

            <img src="imgzip/전공질문1.png" alt="">
